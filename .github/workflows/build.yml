name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            python3-dev \
            git \
            unzip \
            openjdk-17-jdk \
            wget \
            curl \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            cmake \
            libncurses6 \
            libncurses-dev \
            libstdc++6 \
            zlib1g-dev
      
      - name: Install Python packages
        run: |
          pip3 install --user --upgrade pip
          pip3 install --user buildozer cython virtualenv
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      
      - name: Setup Android SDK (FINAL FIX)
        run: |
          # Bersihkan semua
          rm -rf $HOME/android-sdk
          rm -rf $HOME/.buildozer/android/platform/android-sdk
          
          # Buat struktur folder yang benar
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk
          
          # Download SDK tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          
          # CARA BARU: langsung extract ke folder yang benar
          rm -rf cmdline-tools
          unzip -q commandlinetools-linux-9477386_latest.zip -d temp
          mv temp/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          rm -rf temp
          
          # Set environment
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          
          # Accept licenses
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          
          # Install minimal SDK
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-31" \
            "build-tools;31.0.0"
          
          # Copy ke lokasi buildozer
          mkdir -p $HOME/.buildozer/android/platform
          cp -r $HOME/android-sdk $HOME/.buildozer/android/platform/
          
          # Set environment variables untuk step selanjutnya
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          
          echo "✅ Android SDK siap!"
      
      - name: Build APK
        run: |
          export USER=runner
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          # Bersihkan build sebelumnya
          rm -rf bin .buildozer
          
          # Build
          buildozer android debug
      
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: RNSMV2-APK
          path: bin/*.apk