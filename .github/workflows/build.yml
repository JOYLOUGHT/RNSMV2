name: Check Files

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check main.py
        run: |
          echo "📄 MAIN.PY:"
          ls -la main.py
          echo "Jumlah baris:"
          wc -l main.py
          echo "20 baris pertama:"
          head -n 20 main.py
      
      - name: Check buildozer.spec
        run: |
          echo "📄 BUILDOZER.SPEC:"
          cat buildozer.spec
      
      - name: Try build (quick check)
        run: |
          buildozer android debug || echo "Build failed but continuing..."
          echo "🔍 Mencari APK:"
          find . -name "*.apk"
          echo "📁 Isi folder bin:"
          ls -la bin/ || echo "Folder bin tidak ada"