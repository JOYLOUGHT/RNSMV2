name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip openjdk-17-jdk git unzip
          pip3 install buildozer cython virtualenv
      
      - name: Build APK
        run: |
          # Build dengan log lengkap
          buildozer android debug > build.log 2>&1 || true
          
          # Tampilkan log jika error
          if [ ! -f bin/*.apk ]; then
            echo "❌ Build failed. Last 50 lines of log:"
            tail -n 50 build.log
          fi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RNSMV2-APK
          path: bin/*.apk
          if-no-files-found: warn
      
      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log