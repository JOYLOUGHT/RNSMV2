name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            python3-dev \
            git \
            unzip \
            openjdk-17-jdk \
            wget \
            curl \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            cmake
      
      - name: Install Python packages (simple version)
        run: |
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user buildozer cython virtualenv
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      
      - name: Verify files
        run: |
          echo "📁 Current directory:"
          pwd
          echo "📄 Files in repository:"
          ls -la
          echo "📄 Checking main.py:"
          if [ -f main.py ]; then
            echo "✅ main.py exists"
            wc -l main.py
            head -n 5 main.py
          else
            echo "❌ main.py not found!"
          fi
          echo "📄 Checking buildozer.spec:"
          if [ -f buildozer.spec ]; then
            echo "✅ buildozer.spec exists"
            cat buildozer.spec
          else
            echo "❌ buildozer.spec not found!"
          fi
      
      - name: Build APK
        run: |
          export USER=runner
          buildozer android debug || echo "Build failed but continuing..."
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-artifacts
          path: |
            bin/*.apk
            *.log