name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip openjdk-17-jdk git unzip
          pip3 install buildozer cython virtualenv
      
      - name: Debug - List files before build
        run: |
          echo "📁 Current directory:"
          pwd
          echo "📄 All files:"
          ls -la
          echo "📄 Check main.py:"
          cat main.py | head -20
      
      - name: Build APK
        run: |
          buildozer android debug
      
      - name: Debug - List files after build
        run: |
          echo "📁 After build:"
          ls -la
          echo "📁 Check bin folder:"
          ls -la bin/ || echo "bin folder tidak ada"
          echo "📁 Check .buildozer folder:"
          ls -la .buildozer/ || echo ".buildozer folder tidak ada"
          echo "🔍 Cari file .apk:"
          find . -name "*.apk" || echo "Tidak ada file .apk"
      
      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-results
          path: |
            **/*.apk
            **/*.log
            bin/
            .buildozer/