name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build with Docker
        run: |
          # Pull image yang sudah lengkap dengan SDK
          docker pull androidsdk/android-30:latest
          
          # Run build di dalam container
          docker run --rm \
            -v $PWD:/workspace \
            -w /workspace \
            androidsdk/android-30:latest \
            /bin/bash -c "
              apt update && \
              apt install -y python3-pip git && \
              pip3 install buildozer cython virtualenv && \
              export ANDROID_HOME=/android-sdk && \
              buildozer android debug
            "
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RNSMV2-APK
          path: bin/*.apk